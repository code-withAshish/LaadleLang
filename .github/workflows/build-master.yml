name: Master Build & Nightly Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Compile ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: laadlelang.exe
            asset_name: laadlelang-x86_64-windows.exe
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: laadlelang
            asset_name: laadlelang-x86_64-macos
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: laadlelang
            asset_name: laadlelang-aarch64-macos
          # Linux x64 (glibc - works on Ubuntu, Fedora, Debian, etc.)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: laadlelang
            asset_name: laadlelang-x86_64-linux-gnu
          # Linux x64 (musl - purely static, works on Alpine and ANY Linux)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: laadlelang
            asset_name: laadlelang-x86_64-linux-musl
          # Linux ARM64 (for Raspberry Pi, AWS Graviton)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: laadlelang
            asset_name: laadlelang-aarch64-linux-gnu
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Linux Cross-Compilation Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, ${{ matrix.target }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build LaadleLang Binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Output Artifact
        shell: bash
        run: |
          mkdir -p dist-bin
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist-bin/${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist-bin/${{ matrix.asset_name }}

  publish_nightly:
    name: Publish Nightly Release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download all compiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          
      - name: Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (master)"
          prerelease: true
          fail_on_unmatched_files: false
          files: artifacts/*
